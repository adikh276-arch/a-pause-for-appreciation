server {
    listen 80;

    location = / {
        return 301 /pause_for_appreciation/;
    }

    location /pause_for_appreciation/ {
        alias /usr/share/nginx/html/pause_for_appreciation/;
        index index.html;
        try_files $uri $uri/ /pause_for_appreciation/index.html;
    }

    error_page 404 /pause_for_appreciation/index.html;

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
